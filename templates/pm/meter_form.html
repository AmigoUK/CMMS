{% extends "base.html" %}
{% block title %}{{ _('ui.page.new_meter') }} — CMMS{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{{ url_for('pm.meters') }}" class="text-decoration-none small">
        <i class="bi bi-arrow-left me-1"></i>{{ _('ui.button.back_to_meters') }}
    </a>
</div>

<h1 class="h3 mb-4"><i class="bi bi-speedometer2 me-2"></i>{{ _('ui.page.new_meter') }}</h1>

<div class="row">
    <div class="col-lg-6">
        <form method="POST" action="{{ url_for('pm.meter_new') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="card mb-3">
                <div class="card-body">
                    <div class="mb-3">
                        <label for="asset_id" class="form-label">{{ _('ui.label.asset') }} <span class="text-danger">*</span></label>
                        <select class="form-select" id="asset_id" name="asset_id" required>
                            <option value="">— {{ _('ui.label.select') }} —</option>
                            {% for a in assets %}
                            <option value="{{ a.id }}">{{ a.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="name" class="form-label">{{ _('ui.label.meter_name') }} <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" required
                               placeholder="e.g. Run Hours, Batch Count">
                    </div>
                    <div class="row">
                        <div class="col-6">
                            <div class="mb-3">
                                <label for="unit" class="form-label">{{ _('ui.label.unit') }}</label>
                                <input type="text" class="form-control" id="unit" name="unit"
                                       placeholder="e.g. hours, cycles">
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="mb-3">
                                <label for="current_value" class="form-label">{{ _('ui.label.current_value') }}</label>
                                <input type="number" class="form-control" id="current_value" name="current_value"
                                       step="0.1" min="0" value="0">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>{{ _('ui.button.create_meter') }}
                </button>
                <a href="{{ url_for('pm.meters') }}" class="btn btn-outline-secondary">{{ _('ui.button.cancel') }}</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
