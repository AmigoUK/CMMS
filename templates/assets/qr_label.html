<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Labels — CMMS</title>
    <style>
        @media print {
            body { margin: 0; }
            .no-print { display: none !important; }
            .qr-label { page-break-inside: avoid; }
        }
        @media screen {
            body { background: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
            .no-print { text-align: center; padding: 1rem; }
            .no-print button { font-size: 1.1rem; padding: 0.6rem 2rem; background: #0d6efd; color: #fff; border: none; border-radius: 0.375rem; cursor: pointer; margin: 0 0.5rem; }
            .no-print button:hover { background: #0b5ed7; }
            .no-print a { color: #0d6efd; margin-left: 1rem; }
        }
        .labels-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 12px;
            justify-content: center;
        }
        .qr-label {
            width: 240px;
            border: 2px solid #000;
            border-radius: 8px;
            padding: 12px;
            background: #fff;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .qr-label img {
            width: 160px;
            height: 160px;
        }
        .qr-label .asset-name {
            font-size: 13px;
            font-weight: 700;
            margin-top: 8px;
            line-height: 1.2;
            word-wrap: break-word;
        }
        .qr-label .asset-tag {
            font-size: 14px;
            font-weight: 600;
            font-family: monospace;
            margin-top: 4px;
            color: #333;
        }
        .qr-label .asset-location {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }
        .qr-label .scan-text {
            font-size: 10px;
            color: #999;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="no-print">
        <button onclick="window.print()">Print Labels</button>
        <a href="{{ url_for('assets.list_assets') }}">Back to Property</a>
    </div>

    <div class="labels-grid">
        {% for asset in assets %}
        <div class="qr-label">
            <img src="{{ url_for('assets.qr_code', id=asset.id) }}" alt="QR Code">
            <div class="asset-name">{{ asset.name }}</div>
            {% if asset.asset_tag %}
            <div class="asset-tag">{{ asset.asset_tag }}</div>
            {% endif %}
            {% if asset.location %}
            <div class="asset-location">{{ asset.location.full_path }}</div>
            {% endif %}
            <div class="scan-text">Scan to report a problem</div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
