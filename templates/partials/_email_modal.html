{# Reusable email report modal. Pass: email_action (URL), default_subject (str), contacts (list) #}
<div class="modal fade" id="emailReportModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <form method="POST" action="{{ email_action }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-envelope me-2"></i>{{ _('ui.label.email_report') }}</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="email_subject" class="form-label">{{ _('ui.label.subject') }}</label>
                        <input type="text" class="form-control" id="email_subject" name="subject"
                               value="{{ default_subject }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('ui.label.recipients') }}</label>
                        {% if contacts %}
                        <div class="mb-2 d-flex gap-1">
                            <button type="button" class="btn btn-sm btn-outline-dark email-cat-filter active" data-cat="all">{{ _('ui.label.all') }}</button>
                            <button type="button" class="btn btn-sm btn-outline-dark email-cat-filter" data-cat="staff">Staff</button>
                            <button type="button" class="btn btn-sm btn-outline-dark email-cat-filter" data-cat="supplier">Supplier</button>
                            <button type="button" class="btn btn-sm btn-outline-dark email-cat-filter" data-cat="external">External</button>
                        </div>
                        <div style="max-height: 250px; overflow-y: auto; border: 1px solid var(--bs-border-color); border-radius: 0.375rem; padding: 0.5rem;">
                            {% for c in contacts %}
                            <div class="form-check email-contact-row" data-category="{{ c.category }}">
                                <input type="checkbox" class="form-check-input" name="contact_ids"
                                       value="{{ c.id }}" id="contact_{{ c.id }}">
                                <label class="form-check-label" for="contact_{{ c.id }}">
                                    {{ c.name }} &lt;{{ c.email }}&gt;
                                    {% if c.company %}<small class="text-muted">— {{ c.company }}</small>{% endif %}
                                    <span class="badge bg-body-secondary text-body border ms-1">{{ c.category }}</span>
                                </label>
                            </div>
                            {% endfor %}
                        </div>
                        {% else %}
                        <div class="text-muted py-3 text-center">
                            <i class="bi bi-person-lines-fill me-1"></i>
                            {{ _('ui.text.no_contacts') }}
                            <br><a href="{{ url_for('contacts.list_contacts') }}">{{ _('ui.button.manage_contacts') }}</a>
                        </div>
                        {% endif %}
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{{ _('ui.button.cancel') }}</button>
                    <button type="submit" class="btn btn-primary" {% if not contacts %}disabled{% endif %}>
                        <i class="bi bi-send me-1"></i>{{ _('ui.button.send_email') }}
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
document.querySelectorAll('.email-cat-filter').forEach(function(btn) {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.email-cat-filter').forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');
        var cat = this.getAttribute('data-cat');
        document.querySelectorAll('.email-contact-row').forEach(function(row) {
            row.style.display = (cat === 'all' || row.getAttribute('data-category') === cat) ? '' : 'none';
        });
    });
});
</script>
