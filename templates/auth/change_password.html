{% extends "base.html" %}

{% block title %}Change Password | CMMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="card shadow-sm">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-key me-2"></i>{{ _('ui.page.change_password') }}</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('auth.change_password') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="current_password" class="form-label">{{ _('ui.label.current_password') }}</label>
                        <input type="password" class="form-control" id="current_password"
                               name="current_password" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="new_password" class="form-label">{{ _('ui.label.new_password') }}</label>
                        <input type="password" class="form-control" id="new_password"
                               name="new_password" required minlength="8">
                        <div class="form-text">Must be at least 8 characters.</div>
                    </div>

                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">{{ _('ui.label.confirm_password') }}</label>
                        <input type="password" class="form-control" id="confirm_password"
                               name="confirm_password" required minlength="8">
                    </div>

                    <div class="d-flex justify-content-between align-items-center">
                        <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i>{{ _('ui.button.cancel') }}
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>{{ _('ui.button.update_password') }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
