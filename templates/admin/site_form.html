{% extends "base.html" %}

{% block title %}{{ 'Edit Site' if site else 'New Site' }} — CMMS{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{{ url_for('admin.list_sites') }}" class="text-decoration-none">
        <i class="bi bi-arrow-left me-1"></i>Back to Sites
    </a>
</div>

<h1 class="h3 mb-4">
    <i class="bi bi-building me-2"></i>{{ 'Edit Site' if site else 'New Site' }}
</h1>

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-body">
                <form method="POST"
                      action="{{ url_for('admin.update_site', id=site.id) if site else url_for('admin.create_site') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" required
                               value="{{ site.name if site else '' }}">
                    </div>

                    <div class="mb-3">
                        <label for="code" class="form-label">Code <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="code" name="code" required
                               maxlength="20" style="text-transform: uppercase;"
                               value="{{ site.code if site else '' }}">
                        <div class="form-text">Short identifier (e.g. HQ, WEST, FAC-01). Will be uppercased.</div>
                    </div>

                    <div class="mb-3">
                        <label for="address" class="form-label">Address</label>
                        <input type="text" class="form-control" id="address" name="address"
                               value="{{ site.address if site else '' }}">
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description"
                                  rows="3">{{ site.description if site else '' }}</textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>{{ 'Save Changes' if site else 'Create Site' }}
                        </button>
                        <a href="{{ url_for('admin.list_sites') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
