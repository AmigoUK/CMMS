{% extends "base.html" %}

{% block title %}{{ 'Edit Team' if team else 'New Team' }} — CMMS{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{{ url_for('admin.list_teams') }}" class="text-decoration-none">
        <i class="bi bi-arrow-left me-1"></i>Back to Teams
    </a>
</div>

<h1 class="h3 mb-4">
    <i class="bi bi-person-badge me-2"></i>{{ 'Edit Team' if team else 'New Team' }}
</h1>

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-body">
                <form method="POST"
                      action="{{ url_for('admin.update_team', id=team.id) if team else url_for('admin.create_team') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" required
                               value="{{ team.name if team else '' }}">
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description"
                                  rows="3">{{ team.description if team else '' }}</textarea>
                    </div>

                    <div class="form-check mb-3">
                        <input type="checkbox" class="form-check-input" id="is_contractor" name="is_contractor"
                               {% if team and team.is_contractor %}checked{% endif %}>
                        <label class="form-check-label" for="is_contractor">
                            Contractor team
                        </label>
                        <div class="form-text">Check if this team consists of external contractors.</div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>{{ 'Save Changes' if team else 'Create Team' }}
                        </button>
                        <a href="{{ url_for('admin.list_teams') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
